name: Deploy Django App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          /home/django/vibetalk/venv/bin/python -m pip install --upgrade pip
          /home/django/vibetalk/venv/bin/python -m pip install -r requirements.txt

      - name: Run Django Migrations
        run: |
          /home/django/vibetalk/venv/bin/python manage.py makemigrations
          /home/django/vibetalk/venv/bin/python manage.py migrate

      - name: Collect static files
        run: |
          /home/django/vibetalk/venv/bin/python manage.py collectstatic --noinput

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/django/vibetalk
            git pull origin main
            /home/django/vibetalk/venv/bin/activate
            /home/django/vibetalk/venv/bin/python -m pip install -r requirements.txt
            /home/django/vibetalk/venv/bin/python manage.py migrate
            /home/django/vibetalk/venv/bin/python manage.py collectstatic --noinput